  .blob { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }

  .logo-text span { color: var(--terracota); }
  .hero-title { font-family: 'Fraunces', serif; font-weight: 300; font-size: 34px; line-height: 1.18; color: var(--deep); margin-bottom: 10px; }
  .hero-title em { font-style: italic; color: var(--terracota); }
  .hero-sub { font-size: 14px; color: var(--mid); font-weight: 300; line-height: 1.6; max-width: 340px; margin: 0 auto; }

  .search-wrap { position: relative; margin-bottom: 32px; }
  .search-input { width: 100%; background: var(--warm-white); border: 1.5px solid rgba(196,168,152,0.35); border-radius: 16px; padding: 14px 20px 14px 46px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: var(--deep); outline: none; transition: border-color 0.2s; box-shadow: 0 2px 12px rgba(61,43,31,0.05); }
  .search-input:focus { border-color: var(--terracota); }
  .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 16px; opacity: 0.5; }

  .category { margin-bottom: 28px; }
  .cat-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .cat-title { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--soft); }

  .tools-list { display: grid; gap: 8px; }
  .tool-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--warm-white); border-radius: 16px; padding: 16px 18px;
    border: 1.5px solid transparent; text-decoration: none; color: inherit;
    transition: all 0.2s; box-shadow: 0 1px 8px rgba(61,43,31,0.05);
  }

  /* ESTADO ACTIVO: Cambio de ratón y efectos hover */
  .tool-card.is-active { cursor: pointer; }
  .tool-card.is-active:hover { border-color: var(--blush); transform: translateY(-1px); background: #fff; }
  
  .tool-card.is-soon { opacity: 0.5; cursor: default; }
  .tool-card.loading { opacity: 0; }

  .tool-emoji { font-size: 22px; width: 44px; height: 44px; background: var(--cream); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .tool-info { flex: 1; min-width: 0; }
  .tool-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .tool-desc { font-size: 12px; color: var(--soft); line-height: 1.4; }

  .tool-badge { font-size: 10px; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .badge-new  { background: #e8f5ec; color: #4a7a59; }
  .badge-soon { background: rgba(196,168,152,0.18); color: var(--soft); }
  .tool-arrow { color: var(--blush); font-size: 18px; margin-left: auto; }

  #empty-state { display: none; text-align: center; padding: 40px 20px; color: var(--mid); }
  #empty-state a { color: var(--terracota); text-decoration: none; font-weight: 500; }

  footer a { color: var(--terracota); text-decoration: none; }

// LÓGICA DE BÚSQUEDA Y RENDERIZADO
function normalizeText(text) {
  return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

function buildSkeleton() {
  const wrap = document.getElementById('categories-wrap');
  wrap.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'category';
    section.dataset.id = cat.id;
    section.innerHTML = `
      <div class="cat-header"><span class="cat-title">${cat.title}</span></div>
      <div class="tools-list" id="tools-${cat.id}">
        ${cat.tools.map((t, i) => `
          <div class="tool-card loading" id="tool-${cat.id}-${i}">
            <div class="tool-emoji">${t.emoji}</div>
            <div class="tool-info">
              <div class="tool-name">${t.name}</div>
              <div class="tool-desc">${t.desc}</div>
            </div>
          </div>
        `).join('')}
      </div>`;
    wrap.appendChild(section);
  });
}

function hydrateCards() {
  const NEW_BADGE_DAYS = 30;
  CATEGORIES.forEach(cat => {
    cat.tools.forEach((tool, i) => {
      const el = document.getElementById(`tool-${cat.id}-${i}`);
      if (!el) return;
      el.classList.remove('loading');
      
      if (tool.file) {
        el.classList.add('is-active');
        el.onclick = () => { window.location.href = tool.file; };
        const isNew = tool.createdAt && (Date.now() - new Date(tool.createdAt)) / 864e5 <= NEW_BADGE_DAYS;
        el.innerHTML = `
          <div class="tool-emoji">${tool.emoji}</div>
          <div class="tool-info">
            <div class="tool-name">${tool.name}</div>
            <div class="tool-desc">${tool.desc}</div>
          </div>
          ${isNew ? '<span class="tool-badge badge-new">Nuevo</span>' : ''}
          <span class="tool-arrow">›</span>
        `;
      } else {
        el.classList.add('is-soon');
        el.innerHTML = `
          <div class="tool-emoji">${tool.emoji}</div>
          <div class="tool-info">
            <div class="tool-name">${tool.name}</div>
            <div class="tool-desc">${tool.desc}</div>
          </div>
          <span class="tool-badge badge-soon">Pronto</span>
        `;
      }
    });
  });
}

function filterTools(query) {
  const q = normalizeText(query);
  let globalMatch = false;
  CATEGORIES.forEach(cat => {
    const section = document.querySelector(`.category[data-id="${cat.id}"]`);
    let catVisible = false;
    cat.tools.forEach((tool, i) => {
      const card = document.getElementById(`tool-${cat.id}-${i}`);
      const searchContent = normalizeText(`${tool.name} ${tool.desc} ${cat.title} ${(tool.keywords || []).join(' ')}`);
      const match = searchContent.includes(q);
      card.style.display = match ? 'flex' : 'none';
      if (match) catVisible = globalMatch = true;
    });
    section.style.display = catVisible ? 'block' : 'none';
  });
  document.getElementById('empty-state').style.display = globalMatch ? 'none' : 'block';
}

document.getElementById('search-input').addEventListener('input', e => filterTools(e.target.value));

buildSkeleton();
hydrateCards();
</script>
